services:
  - type: web
    name: valert
    env: python
    plan: free
    rootDir: violence_detection

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn violence_detection.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: DEBUG
        value: False

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: .onrender.com