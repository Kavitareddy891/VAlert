{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VAlert — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg-deep:#090c10;--bg-panel:#0d1117;--bg-card:#111820;--bg-raised:#162030;--border:#1e2d3d;--border-lit:#2a4060;--red:#ff2244;--red-dim:#8b0020;--red-glow:rgba(255,34,68,0.18);--green:#00e676;--blue:#4fc3f7;--text-primary:#e8f0fe;--text-secondary:#7a8fa6;--text-muted:#3d5166;--mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;--condensed:'Barlow Condensed',sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}
    .auth-wrap{width:100%;max-width:420px;padding:24px}
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo-icon{width:48px;height:48px;background:var(--red);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);margin:0 auto 12px}
    .auth-logo-text{font-family:var(--condensed);font-size:28px;font-weight:900;letter-spacing:3px}
    .auth-logo-text span{color:var(--red)}
    .auth-sub{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-top:4px}
    .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .auth-card-header{padding:16px 24px;background:var(--bg-panel);border-bottom:1px solid var(--border)}
    .auth-card-title{font-family:var(--condensed);font-size:16px;font-weight:700;letter-spacing:2px}
    .auth-card-body{padding:28px 24px}
    .form-group{margin-bottom:18px}
    label{display:block;font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    input{width:100%;background:var(--bg-raised);border:1px solid var(--border-lit);border-radius:4px;padding:10px 14px;color:var(--text-primary);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--red-dim);box-shadow:0 0 0 2px var(--red-glow)}
    .btn-submit{width:100%;background:var(--green);border:none;border-radius:4px;padding:12px;color:#000;font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:8px}
    .btn-submit:hover{box-shadow:0 0 20px rgba(0,230,118,.4)}
    .auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)}
    .auth-footer a{color:var(--blue);text-decoration:none}
    .error-msg{background:var(--red-glow);border:1px solid var(--red-dim);border-radius:4px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--red);margin-bottom:16px}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-icon"></div>
    <div class="auth-logo-text">V<span>Alert</span></div>
    <div class="auth-sub">CREATE YOUR ACCOUNT</div>
  </div>
  <div class="auth-card">
    <div class="auth-card-header"><div class="auth-card-title">◈ REGISTER</div></div>
    <div class="auth-card-body">
      {% if error %}<div class="error-msg">⚠ {{ error }}</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>Username</label><input type="text" name="username" required autofocus></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" name="password2" required></div>
        <button type="submit" class="btn-submit">→ CREATE ACCOUNT</button>
      </form>
    </div>
  </div>
  <div class="auth-footer">Already have an account? <a href="/login/">Login here</a></div>
</div>
</body>
</html>
